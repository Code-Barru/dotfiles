# GLOBAL OPTIONS

set -g mouse on
set-option -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -g base-index 1
set-option -g status-position top
set-option -g prefix C-s

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# BINDS

unbind r
bind r source-file ~/.tmux.conf
bind-key P command-prompt -p "rename to:" "rename-window '%1'"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
unbind l
bind-key l select-pane -R

bind-key ù split-window -h
bind-key m split-window -v

unbind &
unbind -n &
unbind é
unbind -n é
unbind \"
unbind -n \"
unbind \'
unbind -n \'
unbind (
unbind -n (
unbind -
unbind -n -
unbind è
unbind -n è
unbind _
unbind -n _
unbind ç
unbind -n ç
unbind à
unbind -n à

bind-key  & select-window -t 1
bind-key  é select-window -t 2
bind-key  \" select-window -t 3
bind-key  \' select-window -t 4
bind-key  ( select-window -t 5
bind-key  - select-window -t 6
bind-key  è select-window -t 7
bind-key  _ select-window -t 8
bind-key  ç select-window -t 9
bind-key  à select-window -t 10

# PLUGINS

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_status_style "slanted"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number "#I"

run '~/.tmux/plugins/tpm/tpm'

